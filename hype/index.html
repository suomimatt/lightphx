const b=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function unlock(pass){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b(V.s),iterations:300000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b(V.n)},key,b(V.c));
  return new TextDecoder().decode(pt);
}
async function go(){
  const pass=document.getElementById('pw').value;
  document.getElementById('err').textContent='';
  try{
    const html=await unlock(pass);
    if(document.getElementById('rem').checked){try{localStorage.setItem('la_k',pass);}catch(e){}}
    document.open();document.write(html);document.close();
  }catch(e){document.getElementById('err').textContent='wrong passphrase';}
}
document.getElementById('go').onclick=go;
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')go();});
/* auto-unlock if remembered */
(async()=>{try{const k=localStorage.getItem('la_k');if(k){const html=await unlock(k);document.open();document.write(html);document.close();}}catch(e){try{localStorage.removeItem('la_k');}catch(_){}}})();
</script>
