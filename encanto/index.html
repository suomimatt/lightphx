<style>
body{margin:0;height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;background:#02040a;font-family:'Chakra Petch',sans-serif;color:#eaf2fc}
h1{font-size:clamp(22px,4vw,40px);letter-spacing:.1em;background:linear-gradient(180deg,#ffe9b0,#ffc247 55%,#c98d1e);-webkit-background-clip:text;background-clip:text;color:transparent;margin:0 0 6px}
p{color:#7d8fa8;font-size:12px;letter-spacing:.3em;text-transform:uppercase;margin:0 0 28px}
input[type=password],input[type=text]{background:#0a1220;border:1px solid #1d3252;border-radius:8px;color:#eaf2fc;font-family:'Chakra Petch';font-size:18px;letter-spacing:.15em;padding:12px 18px;text-align:center;outline:none;width:min(320px,80vw)}
input:focus{border-color:#ffc247;box-shadow:0 0 18px rgba(255,194,71,.2)}
button{margin-top:14px;background:none;border:1px solid rgba(255,194,71,.55);color:#ffe9b0;font-family:'Chakra Petch';font-size:13px;letter-spacing:.3em;padding:10px 30px;border-radius:2px;cursor:pointer;text-transform:uppercase}
button:hover{box-shadow:0 0 22px rgba(255,194,71,.25)}
#err{color:#ff6d5a;font-size:11px;letter-spacing:.2em;margin-top:14px;min-height:1em;text-transform:uppercase}
label{margin-top:14px;color:#5b6d88;font-size:11px;letter-spacing:.15em;display:flex;gap:8px;align-items:center;cursor:pointer}
</style></head>

<p>Team access only</p>

}

  const pass=document.getElementById('pw').value.trim().toLowerCase();
  document.getElementById('err').textContent='';
  try{
    const html=await unlock(pass);
    if(document.getElementById('rem').checked){try{localStorage.setItem('la_k',pass);}catch(e){}}
    document.open();document.write(html);document.close();
  }catch(e){document.getElementById('err').textContent='wrong passphrase';}
}
document.getElementById('go').onclick=go;
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')go();});
document.getElementById('show').onchange=e=>{document.getElementById('pw').type=e.target.checked?'text':'password';};
(async()=>{try{const k=localStorage.getItem('la_k');if(k){const html=await unlock(k);document.open();document.write(html);document.close();}}catch(e){try{localStorage.removeItem('la_k');}catch(_){}}})();
</script>
</body></html>
